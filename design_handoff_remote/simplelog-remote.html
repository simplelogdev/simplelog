      --side:     #111116;
      --panel:    #14141a;
      --card:     #1a1a24;

      color: var(--text);

</head>

    ],

const INITIAL_CONNECTIONS = {

    { id: 101, name: "prod-us-east-1",    region: "us-east-1",  profile: "default" },
    { id: 102, name: "staging-eu-west-1", region: "eu-west-1",  profile: "staging" },
  ],

/* ─── Log sample data ─── */
const LOG_LINES = [

/* ────────────── SVG Icons ────────────── */

  <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>
    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
  </svg>
);
const IcoChevronD = ({ c = C.muted, s = 12 }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>
    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
  </svg>
);
const IcoTrash = ({ c = C.muted, s = 14 }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>
    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12l1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-1-1h-5l-1 1H5v2h14V4z"/>
  </svg>
);
const IcoPlus = ({ c = C.muted, s = 14 }) => (

const IcoCheck = ({ c = C.info, s = 14 }) => (

);

/* ────────────── Shared UI primitives ────────────── */
const FieldLabel = ({ text }) => (
  <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: ".8px", textTransform: "uppercase", marginBottom: 4 }}>
    {text}
  </div>
);

const Input = ({ value, onChange, placeholder, type = "text", style = {} }) => {
  const [focused, setFocused] = useState(false);
  return (
    <input
      type={type} value={value} placeholder={placeholder}
      onChange={e => onChange(e.target.value)}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      style={{
        background: C.bg, border: `1px solid ${focused ? C.accent + "88" : "rgba(255,255,255,0.1)"}`,
        borderRadius: 5, padding: "6px 10px", color: C.text,
        width: "100%", fontFamily: "JetBrains Mono, monospace", fontSize: 11.5,
        transition: "border-color .12s", ...style,
      }}
    />
  );
};

const PrimaryBtn = ({ children, onClick, disabled, style = {} }) => {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: disabled ? "rgba(91,143,255,0.3)" : hov ? "#7aa3ff" : C.accent,
        border: "none", borderRadius: 6, padding: "7px 14px",
        color: disabled ? C.muted : "#000", fontWeight: 700, cursor: disabled ? "default" : "pointer",
        fontSize: 12, transition: "background .12s", ...style,
      }}>
      {children}
    </button>
  );
};

const GhostBtn = ({ children, onClick, style = {} }) => {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? "rgba(255,255,255,0.06)" : "transparent",
        border: `1px solid ${C.border}`, borderRadius: 6, padding: "7px 14px",
        color: hov ? C.text : C.muted, cursor: "pointer",
        fontSize: 12, transition: "all .12s", ...style,
      }}>
      {children}
    </button>
  );
};

const Card = ({ children, style = {} }) => (
  <div style={{
    background: C.card, border: `1px solid rgba(255,255,255,0.07)`,
    borderRadius: 10, padding: "12px 14px", ...style,
  }}>
    {children}
  </div>
);

const CardTitle = ({ text }) => (
  <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 10 }}>
    {text}
  </div>
);

/* ────────────── Provider + Form Modal (single popin) ────────────── */
function AddConnectionModal({ onClose, onOpen, onSaveAndOpen }) {
  const [step, setStep] = useState("pick"); // "pick" | "form"
  const [provider, setProvider] = useState(null);
  const [hov, setHov] = useState(null);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    const h = e => { if (e.key === "Escape") { if (step === "form") setStep("pick"); else onClose(); } };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [step, onClose]);

  const selectProvider = (p) => {
    setProvider(p);
    setForm(Object.fromEntries(p.fields.map(f => [f.key, ""])));
    setStep("form");
  };

  const valid = form.name?.trim().length > 0;

  const handleOpen = () => {
    if (!valid) return;
    onOpen({ ...form, id: Date.now(), providerId: provider.id });
    onClose();
  };

  const handleSaveAndOpen = () => {
    if (!valid || saving) return;
    setSaving(true);
    setTimeout(() => {
      setSaved(true);
      onSaveAndOpen({ ...form, id: Date.now(), providerId: provider.id });
      setTimeout(onClose, 500);
    }, 700);
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 200,
      background: "rgba(0,0,0,0.72)", backdropFilter: "blur(6px)",
      display: "flex", alignItems: "center", justifyContent: "center",
    }} onClick={onClose}>
      <div style={{
        background: "#13131a", border: `1px solid rgba(255,255,255,0.1)`,
        borderRadius: 14, width: step === "pick" ? 500 : 480,
        boxShadow: "0 40px 100px rgba(0,0,0,0.85)",
        display: "flex", flexDirection: "column",
        maxHeight: "80vh", overflow: "hidden",
        transition: "width .15s",
      }} onClick={e => e.stopPropagation()}>

        {/* ── Step 1: pick provider ── */}
        {step === "pick" && <>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "22px 22px 16px" }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 14, color: C.text }}>Add remote connection</div>
              <div style={{ color: C.muted, fontSize: 11.5, marginTop: 3 }}>Select a provider to configure</div>
            </div>
            <ModalCloseBtn onClick={onClose} />
          </div>
          <div style={{ padding: "0 22px 22px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              {PROVIDERS.map(p => (
                <button key={p.id}
                  onClick={() => selectProvider(p)}
                  onMouseEnter={() => setHov(p.id)}
                  onMouseLeave={() => setHov(null)}
                  style={{
                    background: hov === p.id ? "#1e1e2c" : "#17171f",
                    border: `1px solid ${hov === p.id ? "rgba(255,255,255,0.13)" : "rgba(255,255,255,0.06)"}`,
                    borderRadius: 9, padding: "13px 13px 11px",
                    cursor: "pointer", textAlign: "left", transition: "all .12s",
                  }}>
                  <div style={{
                    width: 30, height: 30, borderRadius: 7,
                    background: p.color + "20", border: `1px solid ${p.color}35`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 15, color: p.color, marginBottom: 9,
                  }}>{p.icon}</div>
                  <div style={{ fontWeight: 600, fontSize: 12, color: C.text, marginBottom: 3 }}>{p.name}</div>
                  <div style={{ fontSize: 10.5, color: C.muted, lineHeight: 1.45 }}>{p.desc}</div>
                </button>
              ))}
            </div>
          </div>
        </>}

        {/* ── Step 2: fill form ── */}
        {step === "form" && provider && <>
          {/* header */}
          <div style={{
            display: "flex", alignItems: "center", gap: 10,
            padding: "18px 22px 14px", borderBottom: `1px solid rgba(255,255,255,0.07)`,
          }}>
            <button onClick={() => setStep("pick")} style={{
              background: "none", border: "none", cursor: "pointer",
              color: C.muted, display: "flex", alignItems: "center", padding: 2, borderRadius: 4,
            }}
              onMouseEnter={e => e.currentTarget.style.color = C.text}
              onMouseLeave={e => e.currentTarget.style.color = C.muted}>
              <IcoChevronL c="currentColor" s={16} />
            </button>
            <div style={{
              width: 26, height: 26, borderRadius: 7,
              background: provider.color + "20", border: `1px solid ${provider.color}35`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 14, color: provider.color,
            }}>{provider.icon}</div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 13.5, color: C.text }}>{provider.label}</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>New connection</div>
            </div>
            <div style={{ marginLeft: "auto" }}>
              <ModalCloseBtn onClick={onClose} />
            </div>
          </div>

          {/* fields */}
          <div style={{ overflowY: "auto", padding: "18px 22px", display: "flex", flexDirection: "column", gap: 14 }}>
            {provider.fields.map(f => (
              <label key={f.key} style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                <FieldLabel text={f.label} />
                <Input
                  type={f.type} value={form[f.key] || ""} placeholder={f.ph}
                  onChange={v => setForm(prev => ({ ...prev, [f.key]: v }))}
                />
              </label>
            ))}
          </div>

          {/* footer — two actions */}
          <div style={{
            padding: "14px 22px 18px", borderTop: `1px solid rgba(255,255,255,0.07)`,
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <GhostBtn onClick={onClose}>Cancel</GhostBtn>
            <div style={{ flex: 1 }} />
            {/* Open only */}
            <GhostBtn onClick={handleOpen} style={{ opacity: valid ? 1 : .4, cursor: valid ? "pointer" : "default" }}>
              Open
            </GhostBtn>
            {/* Save & Open */}
            <PrimaryBtn onClick={handleSaveAndOpen} disabled={!valid || saving || saved}>
              {saved
                ? <span style={{ display: "flex", alignItems: "center", gap: 5 }}><IcoCheck s={13} c="#000" /> Saved</span>
                : saving ? "Saving…"
                : <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    Save &amp; Open
                  </span>}
            </PrimaryBtn>
          </div>

          {/* hint */}
          <div style={{ padding: "0 22px 14px", fontSize: 10.5, color: C.muted, lineHeight: 1.5 }}>
            <strong style={{ color: "#6a6a8a" }}>Open</strong> — connect once without saving. &nbsp;
            <strong style={{ color: "#6a6a8a" }}>Save &amp; Open</strong> — store the connection for later.
          </div>
        </>}
      </div>
    </div>
  );
}

function ModalCloseBtn({ onClick }) {
  return (
    <button onClick={onClick} style={{
      background: "none", border: "none", cursor: "pointer",
      color: C.muted, padding: 4, display: "flex", alignItems: "center", borderRadius: 4,
    }}
      onMouseEnter={e => e.currentTarget.style.color = C.text}
      onMouseLeave={e => e.currentTarget.style.color = C.muted}>
      <IcoClose s={14} c="currentColor" />
    </button>
  );
}

/* ────────────── Connection Row ────────────── */
function ConnRow({ conn, provider, onDelete }) {
  const [confirm, setConfirm] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [hov, setHov] = useState(false);

  const subtitle = (() => {
    if (provider.id === "cloudwatch") return conn.region || "";
    if (provider.id === "gcp")        return conn.project || "";
    if (provider.id === "azure")      return conn.workspace ? conn.workspace.slice(0, 22) + "…" : "";
    if (provider.id === "vercel")     return conn.team || "";
    if (provider.id === "docker")     return conn.host || "";
    if (provider.id === "ssh")        return conn.user ? `${conn.user}@${conn.host}` : conn.host || "";
    return "";
  })();

  const handleDel = () => {
    if (!confirm) { setConfirm(true); return; }
    setDeleting(true);
    setTimeout(() => onDelete(conn.id), 350);
  };

  return (
    <div
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => { setHov(false); setConfirm(false); }}
      style={{
        display: "flex", alignItems: "center", gap: 10,
        padding: "9px 10px", borderRadius: 6,
        background: deleting ? "rgba(240,120,120,0.05)" : hov ? "rgba(255,255,255,0.04)" : "transparent",
        opacity: deleting ? 0.5 : 1, transition: "all .2s",
      }}>
      {/* status dot */}
      <div style={{
        width: 6, height: 6, borderRadius: "50%", flexShrink: 0,
        background: C.info, boxShadow: `0 0 5px ${C.info}88`,
      }} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 500, fontSize: 12.5, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
          {conn.name}
        </div>
        {subtitle && (
          <div style={{ fontSize: 10.5, color: C.muted, fontFamily: "JetBrains Mono, monospace", marginTop: 1 }}>
            {subtitle}
          </div>
        )}
      </div>
      {/* delete btn — only show on hover */}
      {(hov || confirm) && (
        <button onClick={handleDel} style={{
          background: confirm ? "rgba(240,120,120,0.12)" : "transparent",
          border: `1px solid ${confirm ? "rgba(240,120,120,0.35)" : "transparent"}`,
          borderRadius: 5, cursor: "pointer",
          color: confirm ? C.err : C.muted,
          padding: "3px 8px", fontSize: 11, fontWeight: 500,
          display: "flex", alignItems: "center", gap: 4, transition: "all .12s", flexShrink: 0,
        }}
          onMouseEnter={e => { if (!confirm) e.currentTarget.style.color = C.err; }}
          onMouseLeave={e => { if (!confirm) e.currentTarget.style.color = C.muted; }}>
          {confirm
            ? <><IcoClose s={9} c={C.err} /> Confirm</>
            : <IcoTrash s={13} c="currentColor" />}
        </button>
      )}
    </div>
  );
}

/* ────────────── Remote Panel (main) ────────────── */
function RemotePanel({ connections, setConnections }) {
  const [step, setStep] = useState("list");       // "list" | "provider"
  const [activeProvider, setActiveProvider] = useState(null);
  const [showModal, setShowModal] = useState(false);

  const totalConns = Object.values(connections).flat().length;

  const handleDelete = (providerId, connId) => {
    setConnections(prev => ({
      ...prev,
      [providerId]: prev[providerId].filter(c => c.id !== connId),
    }));
  };

  const openProvider = (p) => { setActiveProvider(p); setStep("provider"); };

  /* Called from modal — "Open" without saving */
  const handleOpen = (data) => {
    // Just open — no persistence, show a toast-like feedback
    console.log("Open (no save):", data);
  };

  /* Called from modal — "Save & Open" */
  const handleSaveAndOpen = (data) => {
    const { providerId, ...rest } = data;
    setConnections(prev => ({
      ...prev,
      [providerId]: [...(prev[providerId] || []), rest],
    }));
  };

  /* ── Provider detail view ── */
  if (step === "provider" && activeProvider) return (
    <>
      <ProviderDetail
        provider={activeProvider}
        connections={connections[activeProvider.id] || []}
        onDelete={id => handleDelete(activeProvider.id, id)}
        onAddNew={() => setShowModal(true)}
        onBack={() => setStep("list")}
      />
      {showModal && (
        <AddConnectionModal
          onClose={() => setShowModal(false)}
          onOpen={handleOpen}
          onSaveAndOpen={handleSaveAndOpen}
        />
      )}
    </>
  );

  /* ── Default list view ── */
  return (
    <>
      <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
        <div style={{ padding: "14px 14px 12px", borderBottom: `1px solid ${C.border}` }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: C.text, marginBottom: 10 }}>Remote</div>
          <button onClick={() => setShowModal(true)}
            style={{
              width: "100%", background: C.accent, border: "none", borderRadius: 6,
              padding: "8px 12px", cursor: "pointer",
              color: "#000", fontSize: 12, fontWeight: 700,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
              transition: "background .12s",
            }}
            onMouseEnter={e => e.currentTarget.style.background = "#7aa3ff"}
            onMouseLeave={e => e.currentTarget.style.background = C.accent}>
            <IcoPlus s={13} c="#000" /> Add
          </button>
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "10px 10px" }}>
          {totalConns === 0 ? (
            <div style={{ textAlign: "center", padding: "40px 16px", color: C.muted }}>
              <div style={{ marginBottom: 10, opacity: .2 }}><IcoRemote s={36} c={C.muted} /></div>
              <div style={{ fontSize: 12, marginBottom: 4 }}>No remote connections</div>
              <div style={{ fontSize: 11, color: "#3a3a4a" }}>Click "Add" to connect a provider</div>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {PROVIDERS.filter(p => (connections[p.id] || []).length > 0).map(p => (
                <ProviderGroup key={p.id} provider={p} connections={connections[p.id] || []}
                  onOpen={() => openProvider(p)}
                  onDelete={id => handleDelete(p.id, id)} />
              ))}
            </div>
          )}
        </div>
      </div>

      {showModal && (
        <AddConnectionModal
          onClose={() => setShowModal(false)}
          onOpen={handleOpen}
          onSaveAndOpen={handleSaveAndOpen}
        />
      )}
    </>
  );
}

            <div style={{ fontWeight: 700, fontSize: 15, color: C.text, marginBottom: 14 }}>Workspaces</div>
            <Card>
              <CardTitle text="Saved workspaces" />
              <div style={{ color: "#3a3a4a", fontSize: 11.5, textAlign: "center", padding: "12px 0" }}>
                No workspaces saved
              </div>
              <GhostBtn style={{ width: "100%", marginTop: 8 }}>Save current session…</GhostBtn>
            </Card>
          </div>
        )}
      </div>

      {/* ── Main area ── */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* Menu bar */}
        <div style={{
          height: 32, background: C.rail, borderBottom: `1px solid ${C.border}`,
          display: "flex", alignItems: "center", padding: "0 12px", gap: 2, flexShrink: 0,
        }}>
          {["File", "Edit", "View", "Help"].map(m => (
            <button key={m} style={{
              background: "none", border: "none", color: C.text, padding: "4px 10px",
              fontSize: 12, cursor: "pointer", borderRadius: 4,
            }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
              onMouseLeave={e => e.currentTarget.style.background = "none"}>
              {m}
            </button>
          ))}
        </div>

        {/* Tab bar */}
        <div style={{
          display: "flex", alignItems: "stretch", background: C.panel,
          borderBottom: `1px solid ${C.border}`, flexShrink: 0, height: 38,
        }}>
          {tabs.map((t, i) => (
            <div key={i} onClick={() => setActiveTab(i)}
              style={{
                display: "flex", alignItems: "center", gap: 7, padding: "0 14px",
                borderRight: `1px solid ${C.border}`,
                background: activeTab === i ? C.bg : "transparent",
                borderTop: activeTab === i ? `2px solid ${C.accent}` : "2px solid transparent",
                cursor: "pointer", color: activeTab === i ? C.text : C.muted,
                fontSize: 12, transition: "all .1s", userSelect: "none",
              }}>
              <span style={{ color: activeTab === i ? t.color : C.muted, fontSize: 11 }}>{t.icon}</span>
              {t.label}
              {activeTab === i && (
                <button style={{
                  background: "none", border: "none", cursor: "pointer",
                  color: C.muted, marginLeft: 4, padding: 2, display: "flex", alignItems: "center", borderRadius: 3,
                }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(240,120,120,0.15)"}
                  onMouseLeave={e => e.currentTarget.style.background = "none"}
                  onClick={e => e.stopPropagation()}>
                  <IcoClose s={9} c="currentColor" />
                </button>
              )}
            </div>
          ))}
        </div>

        {/* Log area + right sidebar */}
        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          {/* Log viewer */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            <LogViewer lines={LOG_LINES} />
            {/* viewer toolbar */}
            <div style={{
              height: 30, borderTop: `1px solid ${C.border}`,
              display: "flex", alignItems: "center", padding: "0 14px", gap: 14,
              background: C.panel, flexShrink: 0,
            }}>
              <label style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted, fontSize: 11 }}>
                <input type="checkbox" defaultChecked style={{ accentColor: C.accent }} /> Autoscroll
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 5, color: C.muted, fontSize: 11 }}>
                <input type="checkbox" defaultChecked style={{ accentColor: C.accent }} /> Timestamps
              </label>
              <span style={{ marginLeft: "auto", fontSize: 10.5, color: C.muted, fontFamily: "JetBrains Mono, monospace" }}>
                14 lines · tailing live <span style={{ color: C.info }}>●</span>
              </span>
            </div>
          </div>

          {/* Right sidebar */}
          <RightSidebar />
        </div>
      </div>

      {/* Status bar */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        height: 22, background: C.status, borderTop: `1px solid ${C.border}`,
        display: "flex", alignItems: "center", padding: "0 14px", gap: 16,
        fontFamily: "JetBrains Mono, monospace", fontSize: 10.5, color: C.muted,
        zIndex: 10,
      }}>
        <span>☁ prod-us-east-1 · us-east-1</span>
        <span>·</span>
        <span>interval: 3s</span>
        <span style={{ marginLeft: "auto" }}>SimpleLog v2.1</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
